name: CI
on:
  pull_request:
    branches: [main]

env:
  node_version: '22.17.0'

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # Important: Nx needs the full history to see what changed

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: ${{ env.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: nrwl/nx-set-shas@v4

      - name: Build Affected
        run: npx nx affected --target=build --parallel=3

      - name: Test Affected with Coverage
        run: npx nx affected --target=test --parallel=3 --coverage.enabled --coverage.reporter=json-summary --coverage.reporter=lcov

      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: ./coverage/packages/core/coverage-summary.json
          json-final-path: ./coverage/packages/core/coverage-final.json
