name: Release and Publish
on:
  release:
    types: [published]

jobs:
  # ── 1. Shared prep: test, version bump, build ─────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # OIDC token for npm trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '22.17.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Test
        run: npx nx run-many --target=test --parallel=3-- --passWithNoTests

      - name: Version Packages
        run: npx nx release version ${{ github.event.release.tag_name }} --stageChanges

      - name: Commit Version Bump
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore: release ${{ github.event.release.tag_name }}"
          branch: main

      - name: Build Projects
        run: nx run-many --target=build

      - name: Update NPM because github supplies old versions
        run: npm install -g npm@latest

      - name: Publish
        run: nx release publish --yes

