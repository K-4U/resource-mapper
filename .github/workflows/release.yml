name: Release and Publish
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '22.17.0'
          registry-url: https://npm.pkg.github.com/

      - name: Install Dependencies
        run: npm ci

      - name: Test
        run: |
          npx nx run-many --target=test --parallel=3 --exclude=core -- --passWithNoTests
          npx nx run core:test

      - name: Version Packages
        run: npx nx release version ${{ github.event.release.tag_name }} --stageChanges

      - name: Commit Version Bump
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore: release ${{ github.event.release.tag_name }}"
          branch: main

      - name: Build Projects
        run: npx nx run-many --target=build

      - name: Publish to Github packages
        run: npx nx release publish --yes
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}