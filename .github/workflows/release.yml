name: Release and Publish
on:
  release:
    types: [published]

jobs:
  # ── 1. Shared prep: test, version bump, build ─────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '22.17.0'

      - name: Install Dependencies
        run: npm ci

      - name: Test
        run: |
          npx nx run-many --target=test --parallel=3 --exclude=core -- --passWithNoTests
          npx nx run core:test

      - name: Version Packages
        run: npx nx release version ${{ github.event.release.tag_name }} --stageChanges

      - name: Commit Version Bump
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore: release ${{ github.event.release.tag_name }}"
          branch: main

      - name: Build Projects
        run: npx nx run-many --target=build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build
          path: |
            packages/*/dist/
            packages/*/build/
            packages/*/package.json

  # ── 2. Publish (matrix: one leg per registry) ─────────────────────────────
  publish:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - registry: npmjs
            registry-url: https://registry.npmjs.org/
            token: ''
          - registry: github-packages
            registry-url: https://npm.pkg.github.com/
            token: ${{ github.token }}
    permissions:
      contents: read
      packages: write   # GitHub Packages push
      id-token: write   # OIDC token for npm trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.0
        with:
          name: build

      - name: Setup Node — ${{ matrix.registry }}
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '22.17.0'
          registry-url: ${{ matrix.registry-url }}

      - name: Install Dependencies
        run: npm ci

      - name: Publish — ${{ matrix.registry }}
        run: npx nx release publish --yes
        env:
          NODE_AUTH_TOKEN: ${{ matrix.token }}
