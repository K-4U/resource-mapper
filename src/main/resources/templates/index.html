<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Service Groups - Resource Mapper')}"></head>
<body>
    <h1>Service Groups Overview</h1>
    <div class="info">
        <p><strong>Instructions:</strong> Click on a group to view its services. Drag nodes to reposition them.</p>
    </div>

    <div style="position: relative;">
        <div id="cy"></div>
        <div th:replace="~{fragments :: legend('index')}"></div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const groups = /*[[${groups}]]*/ {};
        const servicesByGroup = /*[[${servicesByGroup}]]*/ {};

        const elements = [];
        const groupConnections = new Set();

        // Build nodes (one per group)
        Object.keys(groups).forEach(groupName => {
            const groupInfo = groups[groupName];
            const serviceCount = servicesByGroup[groupName] ? servicesByGroup[groupName].length : 0;

            elements.push({
                data: {
                    id: groupName,
                    label: groupInfo.name || groupName
                },
                classes: 'group-node'
            });
        });

        // Build edges between groups
        Object.keys(servicesByGroup).forEach(sourceGroup => {
            const services = servicesByGroup[sourceGroup];
            services.forEach(service => {
                if (service.outgoingConnections) {
                    service.outgoingConnections.forEach(connection => {
                        const targetGroup = connection.targetIdentifier.split('/')[0];
                        if (targetGroup !== sourceGroup) {
                            const edgeId = `${sourceGroup}-${targetGroup}`;
                            if (!groupConnections.has(edgeId)) {
                                groupConnections.add(edgeId);
                                elements.push({
                                    data: {
                                        id: edgeId,
                                        source: sourceGroup,
                                        target: targetGroup
                                    }
                                });
                            }
                        }
                    });
                }
            });
        });

        // Create cytoscape instance with moveable nodes
        const cy = createCytoscape('cy', elements, false);

        // Enable node dragging
        cy.nodes().ungrabify(); // First disable
        cy.nodes().grabify();   // Then enable for all nodes

        // Handle click to navigate
        cy.on('tap', 'node', function(evt) {
            const node = evt.target;
            window.location.href = '/group/' + encodeURIComponent(node.id());
        });

        // Hover effects
        cy.on('mouseover', 'node', function() {
            document.body.style.cursor = 'pointer';
        });
        cy.on('mouseout', 'node', function() {
            document.body.style.cursor = 'default';
        });
        /*]]>*/
    </script>
</body>
</html>
