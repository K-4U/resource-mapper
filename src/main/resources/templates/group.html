<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${(groupInfo != null ? groupInfo.name : groupName) + ' - Resource Mapper'})}"></head>
<body>
    <div th:replace="~{fragments :: header(${groupInfo != null ? groupInfo.name : groupName}, true, ${groupInfo})}"></div>

    <div style="position: relative;">
        <div id="cy"></div>
        <div th:replace="~{fragments :: legend('group')}"></div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const groupName = /*[[${groupName}]]*/ '';
        const services = /*[[${services}]]*/ [];
        const allServices = /*[[${allServices}]]*/ {};

        const elements = [];
        const externalGroups = new Set();

        // Add the main group as a parent node with capitalized name
        const capitalizedGroupName = groupName.charAt(0).toUpperCase() + groupName.slice(1).toLowerCase();
        elements.push({
            data: {
                id: 'group-' + groupName,
                label: capitalizedGroupName
            },
            classes: 'group'
        });

        // Add service nodes as children of main group
        services.forEach((service) => {
            const serviceId = service.groupName + '/' + service.identifier;

            elements.push({
                data: {
                    id: serviceId,
                    parent: 'group-' + groupName,
                    label: service.friendlyName
                },
                classes: 'service'
            });

            // Process outgoing connections
            if (service.outgoingConnections) {
                service.outgoingConnections.forEach(connection => {
                    const targetId = connection.targetIdentifier;
                    const targetGroupName = targetId.split('/')[0];

                    if (targetGroupName !== groupName) {
                        externalGroups.add(targetGroupName);

                        // Find target service info
                        let targetServiceName = targetId;
                        if (allServices[targetGroupName]) {
                            const targetService = allServices[targetGroupName].find(s =>
                                (s.groupName + '/' + s.identifier) === targetId
                            );
                            if (targetService) {
                                targetServiceName = targetService.friendlyName;
                            }
                        }

                        // Add external group container if not exists
                        const extGroupId = 'group-' + targetGroupName;
                        const capitalizedExtGroupName = targetGroupName.charAt(0).toUpperCase() + targetGroupName.slice(1).toLowerCase();

                        if (!elements.find(el => el.data.id === extGroupId)) {
                            elements.push({
                                data: {
                                    id: extGroupId,
                                    label: capitalizedExtGroupName
                                },
                                classes: 'external-group'
                            });
                        }

                        // Add external service node if not exists
                        if (!elements.find(el => el.data.id === targetId)) {
                            elements.push({
                                data: {
                                    id: targetId,
                                    parent: extGroupId,
                                    label: targetServiceName
                                },
                                classes: 'external-service'
                            });
                        }
                    }

                    // Add edge
                    elements.push({
                        data: {
                            id: serviceId + '-' + targetId,
                            source: serviceId,
                            target: targetId,
                            label: 'Port ' + connection.port
                        }
                    });
                });
            }
        });

        // Create cytoscape instance with compound nodes and moveable services
        const cy = createCytoscape('cy', elements, true);

        // Enable dragging for service nodes only (not group containers)
        cy.nodes('.service, .external-service').grabify();
        cy.nodes('.group, .external-group').ungrabify();

        // Handle service node clicks
        cy.on('tap', 'node.service, node.external-service', function(evt) {
            const nodeId = evt.target.id();
            console.log('Clicked on service:', nodeId);
            // Future: navigate to service detail page
        });

        // Better hover cursor
        cy.on('mouseover', 'node.service, node.external-service', function() {
            document.body.style.cursor = 'pointer';
        });
        cy.on('mouseout', 'node.service, node.external-service', function() {
            document.body.style.cursor = 'default';
        });
        /*]]>*/
    </script>
</body>
</html>
