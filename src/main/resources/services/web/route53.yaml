friendlyName: "Route 53"
description: |
  DNS service managing domain name resolution and traffic routing.
  
  Provides highly available and scalable DNS with health checks and failover
  capabilities. Routes traffic to appropriate services based on geographic
  location and service health status.
serviceType: DNS
outgoingConnections:
  - port: 3306
    targetIdentifier: "web/database"
    description: "MySQL database connection"
  - port: 9443
    targetIdentifier: "pt/redis"
    description: "Redis connection"
